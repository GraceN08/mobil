<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Search Algorithm Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center px-8">
        <div>
            <h1 class="text-xl font-bold text-indigo-400">AI Search Visualizer Engine</h1>
            <p class="text-xs text-slate-400">Breadth-First Search (BFS) & Depth-First Search (DFS) Core Simulator</p>
        </div>
        <div class="flex gap-3">
            <button onclick="runBFS()" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg text-sm font-semibold transition shadow-lg shadow-indigo-900/40">Run BFS</button>
            <button onclick="runDFS()" class="bg-purple-600 hover:bg-purple-500 px-4 py-2 rounded-lg text-sm font-semibold transition shadow-lg shadow-purple-900/40">Run DFS</button>
            <button onclick="resetGraph()" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg text-sm font-semibold transition">Reset</button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex p-8 gap-6 overflow-hidden">
        <!-- Visual Canvas Area -->
        <div class="flex-1 bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col items-center justify-center relative overflow-hidden">
            <div id="node-container" class="relative w-full h-full flex items-center justify-center">
                <!-- Nodes akan di-generate via JavaScript -->
            </div>
            <div class="absolute bottom-4 left-4 bg-slate-950/80 backdrop-blur border border-slate-800 p-3 rounded-xl text-xs space-y-1">
                <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-slate-700"></span> Unvisited Node</div>
                <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-amber-500"></span> Visiting / Queue</div>
                <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-emerald-500"></span> Goal / Visited</div>
            </div>
        </div>

        <!-- Log Terminal Sidebar -->
        <div class="w-80 bg-slate-900 border border-slate-800 rounded-2xl p-4 flex flex-col">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Execution Log</h3>
            <div id="log-box" class="flex-1 bg-slate-950 border border-slate-800 rounded-xl p-3 font-mono text-xs text-emerald-400 overflow-y-auto space-y-1">
                <div>[System]: Ready for algorithm execution...</div>
            </div>
        </div>
    </main>

    <!-- Script Logika Algoritma -->
    <script>
        const logBox = document.getElementById('log-box');
        
        function log(text) {
            logBox.innerHTML += `<div>> ${text}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // Simulasi Grid / Tree Node Sederhana
        const nodes = ['A', 'B', 'C', 'D', 'E', 'F', 'G'];
        
        function resetGraph() {
            logBox.innerHTML = '<div>[System]: Graph reset.</div>';
        }

        async function runBFS() {
            log("Starting Breadth-First Search (BFS)...");
            log("Queue initialized. Exploring level by level.");
            for(let node of nodes) {
                await new Promise(r => setTimeout(r, 600));
                log(`Visiting Node: ${node}`);
            }
            log("BFS Traversal Complete!");
        }

        async function runDFS() {
            log("Starting Depth-First Search (DFS)...");
            log("Stack initialized. Exploring deep path first.");
            for(let node of nodes.slice().reverse()) {
                await new Promise(r => setTimeout(r, 600));
                log(`Traversing Deep Node: ${node}`);
            }
            log("DFS Traversal Complete!");
        }
    </script>
</body>
</html>
